apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: awx
images:
  - name: quay.io/ansible/awx-operator
    newTag: 2.19.1
configMapGenerator:
  - name: ssh-keys
    files:
      - ssh-key.pub
  - name: zscaler
    files:
      - ZScaler.pem
resources:
  # Find the latest tag here: https://github.com/ansible/awx-operator/releases
  - github.com/ansible/awx-operator/config/default?ref=2.19.1
  - ./manifests/ubuntu.yaml
  - ./manifests/ubuntu-service.yaml
  - ./manifests/redhat.yaml
  - ./manifests/redhat-service.yaml